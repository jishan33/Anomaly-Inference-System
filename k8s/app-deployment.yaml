apiVersion: apps/v1
kind: Deployment

metadata:
  name: anomaly-inference-system

spec:
  replicas: 3

  selector:
    matchLabels:
      app: anomaly-inference-system

  template:
    metadata:
      labels:
        app: anomaly-inference-system
      annotations:
        prometheus.io/scrape: "true"# <--- Tells Prometheus to look at this pod
        prometheus.io/port: "8000"      # <--- Tells Prometheus which port to scrape

    spec:
      containers:
        - name: anomaly-inference-container
          image: anomaly-inference-system:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: anomaly-inference-config
          ports:
            - containerPort: 8000

          livenessProbe:
            httpGet:
              path: /livez
              port: 8000

            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 2       # Timeout must ALWAYS be less than the period
            successThreshold: 1     # Must pass once to be considered ready
            failureThreshold: 3     # 3 strikes (30 seconds total) before pulling it from the load balancer

          resources:
            requests:
              #1000m = 1 CPU core
              cpu: "200m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"

