apiVersion: autoscaling/v2

kind: HorizontalPodAutoscaler

metadata:
  name: anomaly-inference-system-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anomaly-inference-system

  minReplicas: 2
  maxReplicas: 10

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70