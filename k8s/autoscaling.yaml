apiVersion: autoscaling/v2
# HorizontalPodAutoscaler
#        │
#        ▼
# Reads metrics every sync period
#        │
#        ▼
# Compares current metric vs target metric
#        │
#        ▼
# Calculates desired replica count
#        │
#        ▼
# Updates Deployment replica count
#        │
#        ▼
# ReplicaSet creates/removes Pods
#
# The HPA controller runs inside the Kubernetes control plane and periodically adjusts a scalable workload
# such as a Deployment. The default sync period is commonly 15 seconds.
# desiredReplicas = ceil * (currentReplicas * currentMetricValue / desiredMetricValue)

kind: HorizontalPodAutoscaler

metadata:
  name: anomaly-inference-system-hpa

spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: anomaly-inference-system

  minReplicas: 3
  maxReplicas: 10

  metrics:
    - type: Resource

      resource:
        name: cpu

        target:
          type: Utilization
          averageUtilization: 70