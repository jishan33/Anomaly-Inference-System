apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: shared-worker-redis-scaledobject

spec:
  scaleTargetRef:
    name: shared-worker

  minReplicaCount: 1
  maxReplicaCount: 5

  triggers:
    - type: redis
      metadata:
        address: redis.default.svc.cluster.local:6379
        listName: free_jobs
        listLength: "20"