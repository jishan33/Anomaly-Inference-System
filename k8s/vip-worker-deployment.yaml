apiVersion: apps/v1
kind: Deployment

metadata:
  name: vip-worker

spec:
  replicas: 2

  selector:
    matchLabels:
      app: vip-worker

  template:
    metadata:
      labels:
        app: vip-worker
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9001"     # <--- Workers will be scraped on 9001 directly

    spec:
      containers:
        - name: vip-worker
          image: anomaly-inference-system:latest
          imagePullPolicy: Never
          command:
            - python3
            - -m
            - app.inference.worker

          env:
            - name: WORKER_ROLE
              value: "vip"
          envFrom:
            - configMapRef:
                name: anomaly-inference-config

          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"

            limits:
              cpu: "500m"
              memory: "512Mi"