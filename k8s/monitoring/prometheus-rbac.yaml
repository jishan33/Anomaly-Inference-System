apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus-pod-discovery-binding
subjects:
  - kind: ServiceAccount
    name: default          # The service account Prometheus is using
    namespace: default     # The namespace where Prometheus is running
roleRef:
  kind: ClusterRole
  name: kube-state-metrics # The ClusterRole that has "list" and "watch" for pods
  apiGroup: rbac.authorization.k8s.io