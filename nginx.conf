# nginx.conf
events { }

http {
    # RAte limits zone (per client IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    # Why add rate limiting ?
    # The security gurad.
    # Preventing Brute Force: If someone tries to flood your /detect endpoint with millions of fake transactions to find holes in your anomaly logic,
    # Nginx stops them before they even reach your Python code.
    #
    # Ensuring Fairness: It prevents one "noisy neighbor" (a single client or a misconfigured script) from hogging all the CPU resources of app1, app2, and app3.
    #
    # zone=api_limit:10m: This allocates 10 megabytes of shared memory to track IP addresses.
    # 1MB can store about 16,000 IPs, so your 10MB zone can track roughly 160,000 unique visitors at once.
    # rate=200r/s: This is your "steady state." Nginx will allow 200 requests per second.
    limit_req_status 429;

    upstream backend {
        server app1:8000;
        server app2:8000;
        server app3:8000;
    }

    server {
        listen 80;

        # 🔥 EXCLUDE metrics from rate limiting
        location /metrics {
            proxy_pass http://backend;

            # no limit_req here
        }

        location / {
            # Apply rate limiting
            limit_req zone=api_limit burst=200 nodelay;
            # burst=200 nodelay: This is the most important part for your app's "feel."
            #
            # Burst: Allows a user to exceed 200r/s temporarily (up to 200 extra requests). This is great for web apps that load many small assets at once.
            # Nodelay: Instead of making the user wait (queueing) for the "burst" requests to be processed slowly,
            # Nginx processes them immediately at full speed until the burst bucket is full. Once full, it returns 429 Too Many Requests.

            proxy_pass http://backend;

            # ---FIXED HEADERS---
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forward-For $proxy_add_x_forwarded_for;

            # ---TIMEOUTS (prevent premature 502)---
            proxy_connect_timeout 5s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;

            # ---CONNECTION SETTINGS---
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /nginx-status {
            stub_status;

            allow 127.0.0.1;
            allow 192.168.65.1;
            allow 172.20.0.0/16;   # allow docker network
            deny all;
        }
    }
}