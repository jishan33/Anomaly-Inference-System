global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: "fastapi-app"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "app1:8000"
        labels:
          instance: app1

      - targets:
          - "app2:8000"
        labels:
          instance: app2

      - targets:
          - "app3:8000"
        labels:
          instance: app3

  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']
        labels:
          instance: nginx_proxy

  - job_name: "cadvisor"
    static_configs:
      - targets: [ "cadvisor:8080" ]

  - job_name: "worker"
    static_configs:
      - targets:
          - "vip_worker:9001"
        labels:
              instance: vip_worker
      - targets:
          - "shared_worker:9001"
        labels:
          instance: shared_worker
